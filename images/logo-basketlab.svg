<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="42%" cy="38%" r="58%">
      <stop offset="0%" style="stop-color:#e8a050"/>
      <stop offset="65%" style="stop-color:#d07030"/>
      <stop offset="100%" style="stop-color:#b05828"/>
    </radialGradient>
    <radialGradient id="edge" cx="50%" cy="50%" r="50%">
      <stop offset="88%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.15)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Pelota -->
  <circle cx="50" cy="50" r="44" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="50" cy="50" r="44" fill="url(#edge)" stroke="#7a4a1e" stroke-width="0.8"/>
  <!-- Costuras estilo pelota real (curvas negras) -->
  <path d="M 14 18 C 8 50 8 50 14 82" fill="none" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 86 18 C 92 50 92 50 86 82" fill="none" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 18 12 C 50 6 50 6 82 12 M 18 88 C 50 94 50 94 82 88" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Texto sobre la pelota -->
  <text x="50" y="43" text-anchor="middle" fill="#1a1a1a" font-family="Segoe UI, system-ui, sans-serif" font-weight="700" font-size="12">Basket Lab</text>
  <text x="50" y="58" text-anchor="middle" fill="#333" font-family="Segoe UI, system-ui, sans-serif" font-weight="400" font-size="6.5">by Coach Fritz</text>
</svg>
