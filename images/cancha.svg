<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- Wooden Background (Out of bounds) -->
  <rect width="800" height="600" fill="#dfb175" />
  
  <!-- Court dimensions: 740 x 420 -->
  <rect x="30" y="90" width="740" height="420" fill="#e9c288" stroke="#ffffff" stroke-width="4"/>
  
  <!-- Center Line -->
  <line x1="400" y1="90" x2="400" y2="510" stroke="#ffffff" stroke-width="4"/>
  
  <!-- Center Circle -->
  <circle cx="400" cy="300" r="60" fill="none" stroke="#ffffff" stroke-width="4"/>
  <!-- Center Circle Inner design -->
  <circle cx="400" cy="300" r="20" fill="#ffffff" opacity="0.5"/>
  
  <!-- Left Key (Paint) -->
  <rect x="30" y="210" width="160" height="180" fill="#cc9a52" stroke="#ffffff" stroke-width="4"/>
  <!-- Left Free Throw Circle Solid -->
  <path d="M 190 240 A 60 60 0 0 1 190 360" fill="none" stroke="#ffffff" stroke-width="4" />
  <!-- Left Free Throw Circle Dashed -->
  <path d="M 190 360 A 60 60 0 0 1 190 240" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" />
  
  <!-- Right Key (Paint) -->
  <rect x="610" y="210" width="160" height="180" fill="#cc9a52" stroke="#ffffff" stroke-width="4"/>
  <!-- Right Free Throw Circle Solid -->
  <path d="M 610 240 A 60 60 0 0 0 610 360" fill="none" stroke="#ffffff" stroke-width="4" />
  <!-- Right Free Throw Circle Dashed -->
  <path d="M 610 360 A 60 60 0 0 0 610 240" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" />

  <!-- Left 3-point line -->
  <path d="M 30 115 L 100 115 A 187 187 0 0 1 100 485 L 30 485" fill="none" stroke="#ffffff" stroke-width="4" />
  
  <!-- Right 3-point line -->
  <path d="M 770 115 L 700 115 A 187 187 0 0 0 700 485 L 770 485" fill="none" stroke="#ffffff" stroke-width="4" />

  <!-- Left Backboard & Hoop -->
  <line x1="60" y1="260" x2="60" y2="340" stroke="#ffffff" stroke-width="6"/> <!-- backboard -->
  <line x1="60" y1="300" x2="65" y2="300" stroke="#ff4500" stroke-width="4"/> <!-- rim connector -->
  <circle cx="75" cy="300" r="10" fill="none" stroke="#ff4500" stroke-width="4"/> <!-- hoop -->

  <!-- Right Backboard & Hoop -->
  <line x1="740" y1="260" x2="740" y2="340" stroke="#ffffff" stroke-width="6"/> <!-- backboard -->
  <line x1="735" y1="300" x2="740" y2="300" stroke="#ff4500" stroke-width="4"/> <!-- rim connector -->
  <circle cx="725" cy="300" r="10" fill="none" stroke="#ff4500" stroke-width="4"/> <!-- hoop -->

  <!-- Restricted Areas (Left & Right) -->
  <path d="M 75 265 A 35 35 0 0 1 75 335" fill="none" stroke="#ffffff" stroke-width="3" />
  <path d="M 725 335 A 35 35 0 0 1 725 265" fill="none" stroke="#ffffff" stroke-width="3" />

  <!-- Post markings along the paint -->
  <line x1="190" y1="210" x2="195" y2="210" stroke="#ffffff" stroke-width="4"/>
  <line x1="190" y1="390" x2="195" y2="390" stroke="#ffffff" stroke-width="4"/>
  <line x1="610" y1="210" x2="605" y2="210" stroke="#ffffff" stroke-width="4"/>
  <line x1="610" y1="390" x2="605" y2="390" stroke="#ffffff" stroke-width="4"/>

</svg>
