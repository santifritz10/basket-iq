<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="ball" cx="40%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#e5a050"/>
      <stop offset="70%" style="stop-color:#d07030"/>
      <stop offset="100%" style="stop-color:#b05828"/>
    </radialGradient>
    <radialGradient id="ballEdge" cx="50%" cy="50%" r="50%">
      <stop offset="90%" style="stop-color:transparent"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.12)"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#ball)"/>
  <circle cx="16" cy="16" r="14" fill="url(#ballEdge)" stroke="#7a4a1e" stroke-width="0.5"/>
  <!-- Costura izquierda: curva que va de arriba a abajo -->
  <path d="M 8 6 C 4 16 4 16 8 26" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Costura derecha: simétrica -->
  <path d="M 24 6 C 28 16 28 16 24 26" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
</svg>
